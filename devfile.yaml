schemaVersion: 2.2.0
metadata:
  name: static-web
  language: html
  projectType: static
components:
  - name: runtime
    container:
      image: node:alpine
      mountSources: true
      endpoints:
        - name: http
          targetPort: 3000
  - name: production
    image:
      imageName: placeholder
      dockerfile:
        uri: ./Dockerfile
        buildContext: .
commands:
  - id: dev
    exec:
      component: runtime
      # zappp serves the current worktree (.) with live reload (WebSocket + file watch).
      # See https://github.com/iamovi/zappp
      commandLine: npx --yes zappp . --no-browser -p 3000
      group:
        kind: run
        isDefault: true
