schemaVersion: 2.2.0
metadata:
  name: static-web
  language: html
  projectType: static
components:
  - name: runtime
    container:
      image: nginx:alpine
      mountSources: true
      sourceMapping: /usr/share/nginx/html
      endpoints:
        - name: http
          targetPort: 80
  - name: production
    image:
      imageName: placeholder
      dockerfile:
        uri: ./Dockerfile
        buildContext: .
commands:
  - id: dev
    exec:
      component: runtime
      commandLine: nginx -g 'daemon off;'
      group:
        kind: run
        isDefault: true
