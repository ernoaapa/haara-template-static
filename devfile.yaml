schemaVersion: 2.2.0
metadata:
  name: static-web
  language: html
  projectType: static
components:
  - name: runtime
    container:
      image: node:alpine
      mountSources: true
      sourceMapping: /app
      endpoints:
        - name: http
          targetPort: 3000
  - name: production
    image:
      imageName: placeholder
      dockerfile:
        uri: ./Dockerfile
        buildContext: .
commands:
  - id: dev
    exec:
      component: runtime
      commandLine: npx --yes live-server --port=3000 --no-browser /app
      group:
        kind: run
        isDefault: true
