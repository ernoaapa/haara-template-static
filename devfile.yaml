schemaVersion: 2.2.0
metadata:
  name: static-web
  language: html
  projectType: static
components:
  - name: runtime
    container:
      image: node:alpine
      mountSources: true
      endpoints:
        - name: http
          targetPort: 3000
  - name: production
    image:
      imageName: placeholder
      dockerfile:
        uri: ./Dockerfile
        buildContext: .
commands:
  - id: dev
    exec:
      component: runtime
      # browser-sync serves from the current worktree (.) and watches the parent
      # /projects directory with polling. When git-sync atomically replaces the
      # /projects/current symlink, the parent directory mtime changes and
      # browser-sync detects it, triggering an automatic browser refresh.
      commandLine: npx --yes browser-sync start --server . --files "/projects" --poll 2000 --no-open --port 3000
      group:
        kind: run
        isDefault: true
